services:
  - type: web
    name: novitic-marketing
    env: node
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.ionos.es
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_USER
        value: info@novitic.com
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: info@novitic.com
